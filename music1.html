<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPIN MUSIC | DEEP SPACE AUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #02020a;
            --primary: #ff007f;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-deep); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        /* ================= DEEP SPACE BACKGROUND ================= */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; 
            background: radial-gradient(circle at bottom, #0d001a 0%, #02020a 100%); }
        
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        .comet { position: absolute; width: 2px; height: 2px; background: white; box-shadow: 0 0 20px 2px white; 
            border-radius: 50%; opacity: 0; animation: comet-move var(--d) linear infinite; }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes comet-move {
            0% { transform: translateX(0) translateY(0) scale(0); opacity: 0; }
            10% { opacity: 1; transform: scale(1); }
            100% { transform: translateX(-1000px) translateY(1000px); opacity: 0; }
        }

        header {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 900; 
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }

        .user-badge { background: var(--glass); border: 1px solid var(--primary); padding: 8px 25px; 
            border-radius: 30px; font-family: 'Outfit', sans-serif; font-weight: 700; 
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); display: flex; align-items: center; gap: 10px; }

        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* NEURAL SEARCH BOX */
        .search-area { background: var(--glass); border: 1px solid var(--border); border-radius: 60px;
            padding: 10px 25px; margin-bottom: 50px; display: flex; gap: 15px; backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.2); }
        .search-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 18px; }
        .search-btn { background: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; 
            color: white; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .search-btn:hover { transform: rotate(90deg) scale(1.1); box-shadow: 0 0 20px var(--primary); }

        /* MUSIC GRID */
        #music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        
        .music-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 20px;
            text-align: center; transition: 0.5s; backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .music-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary); box-shadow: 0 0 25px rgba(255, 0, 127, 0.2); }

        .album-wrapper { position: relative; margin-bottom: 20px; }
        .album-art { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--secondary); padding: 5px; transition: 0.5s; }
        .music-card.playing .album-art { animation: disk-spin 8s linear infinite; border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }

        @keyframes disk-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-title { font-size: 15px; font-weight: 700; margin-bottom: 15px; height: 45px; overflow: hidden; color: #eee; }

        /* CONTROL BUTTONS */
        .controls { display: flex; justify-content: center; gap: 20px; }
        .ctrl-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .btn-play { background: var(--primary); color: white; box-shadow: 0 0 10px var(--primary); }
        .btn-stop { background: #333; color: white; }
        .ctrl-btn:hover { transform: scale(1.2); }

        /* GLOBAL PLAYER BAR */
        #global-player { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 2px solid var(--primary); padding: 10px; display: none; z-index: 2000; backdrop-filter: blur(20px); }
        
        .loader { grid-column: 1/-1; text-align: center; padding: 50px; font-family: 'Outfit'; color: var(--primary); letter-spacing: 3px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="space-canvas"></div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">LUPIN MUSIC</div>
        <div class="user-badge"><i class="fas fa-user-circle"></i> <span id="displayUser">LUPIN</span></div>
    </header>

    <div class="main-container">
        <div class="search-area">
            <input type="text" id="musicQuery" class="search-input" placeholder="Search the galaxy for music...">
            <button class="search-btn" onclick="searchMusic()"><i class="fas fa-search"></i></button>
        </div>

        <div id="music-grid">
            <div class="loader">INITIALIZING SPACE AUDIO...</div>
        </div>
    </div>

    <div id="global-player">
        <div id="player-frame"></div>
        <button onclick="stopGlobal()" style="position:absolute; right:20px; top:10px; background:red; border:none; color:white; padding:5px 15px; border-radius:10px; cursor:pointer">CLOSE PLAYER</button>
    </div>

    <script>
        // Deep Space Generator
        const space = document.getElementById('space-canvas');
        function createUniverse() {
            // Create Stars
            for (let i = 0; i < 150; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                let size = Math.random() * 3;
                s.style.width = size + 'px'; s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
                s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                space.appendChild(s);
            }
            // Create Comets
            for (let i = 0; i < 5; i++) {
                let c = document.createElement('div');
                c.className = 'comet';
                c.style.left = Math.random() * 100 + 'vw'; c.style.top = Math.random() * -20 + 'vh';
                c.style.setProperty('--d', (Math.random() * 5 + 10) + 's');
                space.appendChild(c);
            }
        }
        createUniverse();

        // User Data
        const currentUser = localStorage.getItem('systemUser') || "Lupin Starnley";
        document.getElementById('displayUser').innerText = currentUser.toUpperCase();

        // API Setup
        const apiKey = 'aeda0d80dcmsh4d45373c74ce2a6p11ba49jsn06dc12a7f7e9';
        const apiHost = 'youtube-v38.p.rapidapi.com';

        async function searchMusic(query = 'Latest Bongo Fleva 2026') {
            const input = document.getElementById('musicQuery').value.trim();
            const finalQuery = input || query;
            const grid = document.getElementById('music-grid');
            grid.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> SCANNING YOUTUBE MUSIC...</div>';

            try {
                const response = await fetch(`https://${apiHost}/search/?q=${encodeURIComponent(finalQuery)}`, {
                    headers: { 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost }
                });
                const data = await response.json();
                grid.innerHTML = '';

                data.contents.forEach(item => {
                    if(item.video) {
                        const v = item.video;
                        grid.innerHTML += `
                            <div class="music-card" id="card-${v.videoId}">
                                <div class="album-wrapper">
                                    <img src="${v.thumbnails[0].url}" class="album-art">
                                </div>
                                <div class="song-title">${v.title}</div>
                                <div class="controls">
                                    <button class="ctrl-btn btn-play" onclick="playSong('${v.videoId}')" title="Play"><i class="fas fa-play"></i></button>
                                    <button class="ctrl-btn btn-stop" onclick="stopSong()" title="Stop"><i class="fas fa-pause"></i></button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                grid.innerHTML = '<div class="loader" style="color:red">CONNECTION ERROR.</div>';
            }
        }

        function playSong(id) {
            // Reset all cards
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('playing'));
            
            const activeCard = document.getElementById(`card-${id}`);
            activeCard.classList.add('playing');

            const playerBar = document.getElementById('global-player');
            const frame = document.getElementById('player-frame');
            
            playerBar.style.display = 'block';
            frame.innerHTML = `<iframe width="100%" height="60" src="https://www.youtube.com/embed/${id}?autoplay=1&controls=1" allow="autoplay"></iframe>`;
        }

        function stopSong() {
            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('playing'));
            document.getElementById('player-frame').innerHTML = '';
            document.getElementById('global-player').style.display = 'none';
        }

        function stopGlobal() { stopSong(); }

        // Initial Search
        window.onload = () => searchMusic();
        document.getElementById("musicQuery").addEventListener("keypress", (e) => { if(e.key === "Enter") searchMusic(); });
    </script>
</body>
</html>
