<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUPIN MESSENGER | NEURAL LINK</title>
    <script src="https://unpkg.com/@cometchat/chat-sdk-javascript@latest/CometChat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050510;
            --primary: #00e5ff; /* Cyan */
            --secondary: #b026ff; /* Purple */
            --admin-gold: #ffd700; /* Gold for Admin */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg-deep); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* 🌌 Deep Space Animations */
        #universe-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #130b29 0%, #050510 100%); overflow: hidden;}
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        .comet { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; box-shadow: 0 0 10px 2px rgba(255,255,255,0.8), -20px 0 20px 2px rgba(0, 229, 255, 0.8); animation: shoot 4s linear infinite; }
        
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        @keyframes shoot { 0% { transform: translate(100vw, -20vh) rotate(-45deg); opacity: 1; } 100% { transform: translate(-20vw, 100vh) rotate(-45deg); opacity: 0; } }

        /* Stylish Custom Modal (Replaces ugly browser prompt) */
        #custom-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .custom-modal { background: rgba(10, 10, 25, 0.9); border: 1px solid var(--primary); padding: 25px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); width: 90%; max-width: 400px; text-align: center; }
        .custom-modal h3 { color: var(--primary); font-family: 'Outfit'; margin-bottom: 15px; }
        .custom-modal input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: white; outline: none; margin-bottom: 20px; font-size: 16px; }
        .custom-modal input:focus { border-color: var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btns button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-cancel { background: var(--glass-strong); color: white; }
        .btn-confirm { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        /* Device Modal */
        #device-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .device-btn { background: var(--glass-strong); border: 1px solid var(--primary); color: white; padding: 15px 30px; margin: 10px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 250px; transition: 0.3s; }
        .device-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 15px var(--primary); }

        /* Header */
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 5, 16, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 50; position: relative;}
        .menu-bar { font-size: 24px; color: var(--primary); cursor: pointer; display: none; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .app-container { display: flex; flex: 1; width: 100%; overflow: hidden; position: relative; }

        /* Sidebar - Fixed for mobile layout */
        .sidebar { width: 320px; background: rgba(5, 5, 15, 0.85); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s ease; z-index: 10; backdrop-filter: blur(15px); }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .grid-btn { padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: white; background: var(--glass-strong); border: 1px solid var(--border); transition: 0.3s; }
        .btn-gold { border-color: var(--admin-gold); color: var(--admin-gold); }

        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; background: var(--glass); transition: 0.3s; border: 1px solid transparent; }
        .chat-item:hover, .chat-item.active { background: rgba(0, 229, 255, 0.1); border-color: var(--primary); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, var(--secondary), var(--primary)); display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; }
        .online-dot { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; position: absolute; bottom: 0; right: 0; border: 2px solid var(--bg-deep); box-shadow: 0 0 5px #00ff00;}

        /* Chat Window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.4); position: relative; height: 100%; }
        .chat-header { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        #messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(176, 38, 255, 0.2)); border: 1px solid var(--primary); border-bottom-right-radius: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .msg.received { align-self: flex-start; background: var(--glass-strong); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        /* Gold Admin Name */
        .admin-name { color: var(--admin-gold) !important; font-weight: 900; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .sender-name { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 5px; display: block; }

        /* Input Area - More Visible */
        .input-area { padding: 15px; background: rgba(5, 5, 15, 0.95); display: flex; align-items: center; gap: 10px; border-top: 2px solid rgba(0, 229, 255, 0.3); z-index: 10; }
        .msg-input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid var(--primary); padding: 15px; border-radius: 25px; color: white; outline: none; font-size: 14px; transition: 0.3s;}
        .msg-input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; background: var(--glass-strong); color: var(--primary); border: 1px solid var(--primary); }
        .btn-send { background: var(--primary); color: black; }

        .whatsapp-footer { text-align: center; padding: 5px; font-size: 10px; color: #888; background: #000; }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .menu-bar { display: block; }
            .sidebar { position: absolute; left: -100%; top: 0; height: 100%; width: 85%; max-width: 320px; background: rgba(5, 5, 16, 0.98); z-index: 100; border-right: 2px solid var(--primary); }
            .sidebar.active { left: 0; box-shadow: 100vw 0 0 rgba(0,0,0,0.5); }
            .msg { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <h3 id="modal-title">Enter Info</h3>
            <input type="text" id="modal-input" placeholder="Type here...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="submitModal()">OK</button>
            </div>
        </div>
    </div>

    <div id="device-modal">
        <h2 style="color: var(--primary); margin-bottom: 20px; font-family: 'Outfit';"><i class="fas fa-microchip"></i> INITIALIZE DEVICE</h2>
        <p style="margin-bottom: 30px; color: #aaa; text-align: center;">Choose your device interface.</p>
        <button class="device-btn" onclick="setDevice('phone')"><i class="fas fa-mobile-alt"></i> Mobile Phone</button>
        <button class="device-btn" onclick="setDevice('pc')"><i class="fas fa-desktop"></i> PC / Laptop</button>
    </div>

    <div id="universe-bg"></div>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars menu-bar" onclick="toggleSidebar()"></i>
            <div class="logo">LUPIN MESSENGER</div>
        </div>
        <div style="font-size: 12px; color: #00ff41; font-weight: bold;"><i class="fas fa-lock"></i> Encrypted</div>
    </header>

    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="action-grid">
                <button class="grid-btn" onclick="openCreateGroupModal()"><i class="fas fa-users"></i> New Group</button>
                <button class="grid-btn btn-gold" onclick="sendInvite()"><i class="fas fa-paper-plane"></i> Invite Link</button>
            </div>
            
            <div style="padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--primary); font-weight: bold;">
                <i class="fas fa-list"></i> CHATS & CHANNELS
            </div>
            
            <div class="list-container" id="chat-list">
                <p style="text-align: center; color: #888; font-size: 12px; margin-top: 20px;">Fetching Encrypted Data...</p>
            </div>
        </div>

        <div class="chat-window" onclick="closeSidebarOnMobile()">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="avatar" id="active-avatar"><i class="fas fa-hashtag"></i></div>
                    <div>
                        <h4 id="active-name" style="font-size: 16px;">Select a Chat</h4>
                        <span style="font-size: 11px; color: var(--primary);">End-to-End Encryption</span>
                    </div>
                </div>
            </div>

            <div id="messages-view">
                <div style="text-align: center; margin-top: 50px; opacity: 0.3;">
                    <i class="fas fa-space-shuttle" style="font-size: 50px; color: var(--primary);"></i>
                    <p style="margin-top: 10px;">Lupin Neural Link Ready</p>
                </div>
            </div>

            <div class="input-area">
                <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="sendImage(this)">
                <button class="action-btn" onclick="document.getElementById('image-upload').click()"><i class="fas fa-camera"></i></button>
                <input type="text" id="chat-input" class="msg-input" placeholder="Type a message...">
                <button class="action-btn btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="whatsapp-footer">
        <i class="fas fa-shield-alt"></i> from <strong>LUPIN UNIVERSE</strong>
    </div>

    <script>
        // --- Custom Modal Logic ---
        let modalCallback = null;
        function openCreateGroupModal() {
            document.getElementById('modal-title').innerText = "Create New Channel";
            document.getElementById('modal-input').placeholder = "e.g. Hackers Hub";
            document.getElementById('modal-input').value = "";
            document.getElementById('custom-modal-overlay').style.display = 'flex';
            modalCallback = (val) => {
                if(val) {
                    let guid = "grp_" + Date.now();
                    let group = new CometChat.Group(guid, val, CometChat.GROUP_TYPE.PUBLIC);
                    CometChat.createGroup(group).then(g => fetchChats());
                }
            };
        }
        function closeModal() { document.getElementById('custom-modal-overlay').style.display = 'none'; }
        function submitModal() {
            let val = document.getElementById('modal-input').value.trim();
            closeModal();
            if(modalCallback && val) modalCallback(val);
        }

        // --- UI Logic ---
        function setDevice(deviceType) {
            document.getElementById('device-modal').style.display = 'none';
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeSidebarOnMobile() { if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active'); }

        // --- Space Animation ---
        const space = document.getElementById('universe-bg');
        for(let i=0; i<80; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 3 + 's';
            space.appendChild(star);
        }

        // --- COMETCHAT LOGIC ---
        const APP_ID = "1676951d3d4c86874";
        const REGION = "us";
        const AUTH_KEY = "a5190f68138ec4ce35cbb195663f4a804f015f0d";
        
        // AUTO LOGIN LOGIC (No prompts!)
        let myID = localStorage.getItem('systemUser');
        if(!myID) {
            // Fallback if they bypassed index.html
            myID = "user_" + Math.floor(Math.random()*1000); 
            localStorage.setItem('systemUser', myID);
        }
        myID = myID.toLowerCase().replace(/\s/g, ''); 

        let currentReceiver = "";
        let currentType = ""; // 'user' or 'group'

        const appSetting = new CometChat.AppSettingsBuilder().subscribePresenceForAllUsers().setRegion(REGION).build();
        
        CometChat.init(APP_ID, appSetting).then(() => {
            CometChat.login(myID, AUTH_KEY).then(user => { startApp(); }, error => {
                let newUser = new CometChat.User(myID);
                newUser.setName(myID);
                CometChat.createUser(newUser, AUTH_KEY).then(u => startApp());
            });
        });

        function startApp() {
            fetchChats();
            setupListeners();
        }

        function fetchChats() {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";

            // Fetch Groups
            let groupReq = new CometChat.GroupsRequestBuilder().setLimit(15).build();
            groupReq.fetchNext().then(groups => {
                groups.forEach(g => {
                    list.innerHTML += createChatItem(g.guid, g.name, 'group', 'fas fa-users');
                });
            });

            // Fetch Users
            let userReq = new CometChat.UsersRequestBuilder().setLimit(20).build();
            userReq.fetchNext().then(users => {
                users.forEach(u => {
                    if(u.uid !== myID) {
                        let isOnline = u.status === "online" ? '<div class="online-dot"></div>' : '';
                        list.innerHTML += createChatItem(u.uid, u.name, 'user', 'fas fa-user', isOnline);
                    }
                });
            });
        }

        function createChatItem(id, name, type, iconClass, onlineBadge = '') {
            return `
                <div class="chat-item" onclick="openChat('${id}', '${name}', '${type}')" id="chat-${id}">
                    <div class="avatar"><i class="${iconClass}"></i>${onlineBadge}</div>
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:14px;">${name}</div>
                        <div style="font-size:10px; color:#aaa;">${type === 'group' ? 'Channel' : 'Direct Message'}</div>
                    </div>
                </div>
            `;
        }

        function openChat(id, name, type) {
            currentReceiver = id;
            currentType = type;
            document.getElementById('active-name').innerText = name;
            document.getElementById('active-avatar').innerHTML = type === 'group' ? '<i class="fas fa-users"></i>' : '<i class="fas fa-user"></i>';
            closeSidebarOnMobile();

            if(type === 'group') {
                CometChat.joinGroup(id, CometChat.GROUP_TYPE.PUBLIC).then(() => loadHistory(), () => loadHistory());
            } else {
                loadHistory();
            }
        }

        function loadHistory() {
            let messagesRequest = new CometChat.MessagesRequestBuilder()
                .setUID(currentType === 'user' ? currentReceiver : null)
                .setGUID(currentType === 'group' ? currentReceiver : null)
                .setLimit(50).build();

            messagesRequest.fetchPrevious().then(messages => {
                const view = document.getElementById('messages-view');
                view.innerHTML = "";
                messages.forEach(renderMsg);
                view.scrollTop = view.scrollHeight;
            });
        }

        function renderMsg(msg) {
            if (msg.category !== "message") return;
            
            // STRICT FILTERING: Prevent messages showing in wrong chats
            if (currentType === 'group' && msg.receiverId !== currentReceiver) return;
            if (currentType === 'user' && msg.receiverType === 'group') return;
            if (currentType === 'user' && msg.receiverType === 'user' && msg.sender.uid !== currentReceiver && msg.sender.uid !== myID) return;

            const view = document.getElementById('messages-view');
            const isMe = msg.sender.uid === myID;
            
            // Gold Admin verification
            let isAdmin = (msg.sender.uid.includes("admin") || msg.sender.uid === "lupin" || msg.sender.name.toLowerCase() === "lupin");
            let nameClass = isAdmin ? "sender-name admin-name" : "sender-name";
            let adminBadge = isAdmin ? " <i class='fas fa-crown' style='color:gold; font-size:9px;'></i>" : "";

            let content = msg.text || "";
            if(msg.type === "image") content = `<img src="${msg.data.url}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;

            let time = new Date(msg.sentAt*1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            view.innerHTML += `
                <div class="msg ${isMe ? 'sent' : 'received'}">
                    ${currentType === 'group' && !isMe ? `<span class="${nameClass}">${msg.sender.name}${adminBadge}</span>` : ''}
                    <div>${content}</div>
                    <div style="font-size:9px; text-align:right; margin-top:5px; opacity:0.6; color: ${isMe ? '#00e5ff' : '#aaa'};">${time}</div>
                </div>
            `;
            view.scrollTop = view.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !currentReceiver) return;

            let receiverType = currentType === 'group' ? CometChat.RECEIVER_TYPE.GROUP : CometChat.RECEIVER_TYPE.USER;
            let textMsg = new CometChat.TextMessage(currentReceiver, text, receiverType);
            
            CometChat.sendMessage(textMsg).then(msg => {
                renderMsg(msg);
                input.value = "";
            });
        }

        function sendImage(input) {
            if(!input.files[0] || !currentReceiver) return;
            let receiverType = currentType === 'group' ? CometChat.RECEIVER_TYPE.GROUP : CometChat.RECEIVER_TYPE.USER;
            let mediaMsg = new CometChat.MediaMessage(currentReceiver, input.files[0], CometChat.MESSAGE_TYPE.IMAGE, receiverType);
            CometChat.sendMediaMessage(mediaMsg).then(msg => { renderMsg(msg); });
        }

        function sendInvite() {
            let num = prompt("Enter WhatsApp number (e.g. 2557...):");
            if(num) {
                let msg = encodeURIComponent("🚨 *LUPIN NEURAL LINK* 🚨\nJoin my new secure chat platform! It's 100% encrypted, fast, and has a space UI.\nLink: https://rebrand.ly/lupper-updated");
                window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
            }
        }

        function setupListeners() {
            let listenerID = "LUPIN_LISTENER_" + Math.random();
            CometChat.addMessageListener(listenerID, new CometChat.MessageListener({
                onTextMessageReceived: msg => renderMsg(msg),
                onMediaMessageReceived: msg => renderMsg(msg)
            }));
            
            CometChat.addUserListener(listenerID, new CometChat.UserListener({
                onUserOnline: user => fetchChats(),
                onUserOffline: user => fetchChats()
            }));
        }

        document.getElementById('chat-input').addEventListener("keypress", e => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
