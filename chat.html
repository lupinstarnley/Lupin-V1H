<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ ThinkApp ✨ | Cosmic WhatsApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --space-bg: #05030d;
            --glass-bg: rgba(20, 18, 48, 0.7);
            --neon-cyan: #00e5ff;
            --neon-purple: #b026ff;
            --wa-green: #25D366;
            --text-main: #f0f0ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--space-bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* background animation */
        .stars-bg { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1b1448 0%, #05030d 100%); }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            backdrop-filter: blur(10px);
        }

        /* SIDEBAR / CHAT LIST */
        .sidebar {
            width: 350px;
            background: rgba(8, 5, 20, 0.9);
            border-right: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 10;
        }

        .header-ui {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-cyan);
        }

        .profile-section { display: flex; align-items: center; gap: 10px; }
        .p-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon-cyan); object-fit: cover; }

        .chats-scroll { flex: 1; overflow-y: auto; }
        .chat-tile {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .chat-tile:hover { background: rgba(0, 229, 255, 0.1); }
        .chat-tile.active { background: rgba(176, 38, 255, 0.2); border-left: 4px solid var(--neon-purple); }

        /* MAIN CHAT AREA */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 3, 15, 0.5);
            position: relative;
        }

        .chat-header {
            padding: 10px 15px;
            background: rgba(15, 12, 35, 0.9);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        }

        .back-btn { display: none; font-size: 20px; color: var(--neon-cyan); cursor: pointer; margin-right: 5px; }

        .messages-view {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* WA pattern */
            background-blend-mode: overlay;
            background-color: rgba(5, 3, 15, 0.9);
        }

        /* Message Bubbles */
        .msg { max-width: 75%; margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; position: relative; font-size: 14.5px; line-height: 1.4; clear: both; }
        .msg.sent { float: right; background: #005c4b; color: white; border-bottom-right-radius: 2px; }
        .msg.received { float: left; background: #202c33; color: white; border-bottom-left-radius: 2px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }
        .ticks { font-size: 11px; margin-left: 5px; color: var(--neon-cyan); }

        /* WhatsApp Input Bar */
        .input-bar {
            padding: 10px 15px;
            background: #100d24;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-wrapper {
            flex: 1;
            background: #2a273f;
            border-radius: 25px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }
        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 15px;
        }
        .icon-action { color: #8696a0; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .icon-action:hover { color: var(--neon-cyan); }
        .send-btn {
            width: 45px;
            height: 45px;
            background: var(--wa-green);
            border: none;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; }
            .chat-main { width: 100%; position: absolute; height: 100%; left: 100%; transition: 0.3s; }
            .app-container.chat-open .sidebar { left: -100%; }
            .app-container.chat-open .chat-main { left: 0; }
            .back-btn { display: block; }
        }

        /* Status & Calls logic alerts */
        .status-dot { width: 10px; height: 10px; background: var(--wa-green); border-radius: 50%; box-shadow: 0 0 5px var(--wa-green); }
    </style>
</head>
<body>

<div class="stars-bg"></div>

<div class="app-container" id="mainWrapper">
    
    <div class="sidebar">
        <div class="header-ui">
            <div class="profile-section">
                <img src="https://via.placeholder.com/150" class="p-img" id="myAvatar">
                <span style="font-weight: bold; font-size: 14px;">Me (Lupin)</span>
            </div>
            <div style="display:flex; gap: 15px;">
                <i class="fas fa-circle-notch icon-action" onclick="lupinDevelop()"></i>
                <i class="fas fa-plus icon-action" onclick="createNewChat()"></i>
                <i class="fas fa-ellipsis-v icon-action"></i>
            </div>
        </div>
        
        <div class="chats-scroll" id="chatsList">
            <div style="text-align: center; padding: 20px; opacity: 0.5;">Loading Galactic Threads...</div>
        </div>
    </div>

    <div class="chat-main" id="chatWindow">
        <div class="chat-header">
            <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
            <img src="https://via.placeholder.com/150" class="p-img" style="width: 40px; height: 40px;" id="headerAvatar">
            <div style="flex: 1;">
                <div style="font-weight: bold;" id="headerName">Select a contact</div>
                <div style="font-size: 11px; color: var(--wa-green);" id="headerStatus">online</div>
            </div>
            <div style="display:flex; gap: 20px;">
                <i class="fas fa-video icon-action" onclick="lupinDevelop()"></i>
                <i class="fas fa-phone icon-action" onclick="lupinDevelop()"></i>
                <i class="fas fa-search icon-action"></i>
            </div>
        </div>

        <div class="messages-view" id="msgContainer">
            <div style="text-align: center; margin-top: 50px; color: #8696a0;">
                <i class="fas fa-user-astronaut fa-3x" style="margin-bottom: 15px; color: var(--neon-cyan);"></i><br>
                Welcome to ThinkApp Neural Link.<br>End-to-End Encrypted via Space Bridge.
            </div>
        </div>

        <div class="input-bar">
            <i class="far fa-laugh icon-action" onclick="lupinDevelop()"></i>
            <div class="input-wrapper">
                <i class="fas fa-paperclip icon-action" style="font-size: 18px;" onclick="document.getElementById('fileInp').click()"></i>
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <input type="file" id="fileInp" style="display:none">
                <i class="fas fa-camera icon-action" onclick="lupinDevelop()"></i>
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBZB8z8rSFohwnVx8M4wBHr4O51BFbFw9g",
        authDomain: "lupin-neural-link.firebaseapp.com",
        databaseURL: "https://lupin-neural-link-default-rtdb.firebaseio.com",
        projectId: "lupin-neural-link",
        storageBucket: "lupin-neural-link.appspot.com",
        messagingSenderId: "511177248524",
        appId: "1:511177248524:web:b02b141e3259e8790d0329"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- USER IDENTITY ---
    let myID = localStorage.getItem("lupin_uid");
    if(!myID) {
        myID = "LUPIN-" + Math.floor(Math.random() * 9000);
        localStorage.setItem("lupin_uid", myID);
    }

    let activeChatID = null;

    // --- NAVIGATION LOGIC ---
    function openChat(chatID, name, avatar) {
        activeChatID = chatID;
        document.getElementById('headerName').innerText = name;
        document.getElementById('headerAvatar').src = avatar || "https://via.placeholder.com/150";
        document.getElementById('mainWrapper').classList.add('chat-open');
        loadMessages(chatID);
    }

    function closeChat() {
        document.getElementById('mainWrapper').classList.remove('chat-open');
        activeChatID = null;
    }

    function lupinDevelop() {
        alert("Lupin will develop this feature soon! Stay tuned, Team Mate.");
    }

    // --- REALTIME CHATS LIST ---
    function loadChats() {
        db.ref('chats').on('value', snapshot => {
            const list = document.getElementById('chatsList');
            list.innerHTML = '';
            const data = snapshot.val();
            
            if(!data) {
                list.innerHTML = '<div style="padding:20px; opacity:0.5; text-align:center;">No galactic signals found. Start a new chat!</div>';
                return;
            }

            Object.keys(data).forEach(id => {
                const chat = data[id].meta;
                const tile = document.createElement('div');
                tile.className = 'chat-tile';
                tile.innerHTML = `
                    <img src="${chat.avatar || 'https://via.placeholder.com/150'}" class="p-img">
                    <div style="flex: 1;">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-weight:bold;">${chat.name}</span>
                            <span style="font-size:10px; opacity:0.5;">12:00</span>
                        </div>
                        <div style="font-size:13px; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:180px;">
                            ${chat.lastMsg || 'Tap to start chat'}
                        </div>
                    </div>
                `;
                tile.onclick = () => openChat(id, chat.name, chat.avatar);
                list.appendChild(tile);
            });
        });
    }

    // --- REALTIME MESSAGES ---
    function loadMessages(chatID) {
        const container = document.getElementById('msgContainer');
        db.ref(`chats/${chatID}/messages`).off(); // Clear previous listener
        
        db.ref(`chats/${chatID}/messages`).on('value', snapshot => {
            container.innerHTML = '';
            const msgs = snapshot.val();
            if(!msgs) return;

            Object.values(msgs).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.sender === myID ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${m.text}
                    <span class="msg-time">
                        ${m.time} ${m.sender === myID ? '<i class="fas fa-check-double ticks"></i>' : ''}
                    </span>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // --- SEND LOGIC ---
    document.getElementById('sendBtn').onclick = () => {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        
        if(!text || !activeChatID) return;

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        db.ref(`chats/${activeChatID}/messages`).push({
            sender: myID,
            text: text,
            time: time,
            timestamp: Date.now()
        });

        // Update last message in meta
        db.ref(`chats/${activeChatID}/meta`).update({ lastMsg: text });

        input.value = '';
    };

    // Allow Enter key to send
    document.getElementById('msgInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            document.getElementById('sendBtn').click();
        }
    });

    // --- CREATE NEW CHAT (Helper) ---
    function createNewChat() {
        const name = prompt("Enter contact name:");
        if(!name) return;
        const chatID = "chat_" + Date.now();
        db.ref(`chats/${chatID}/meta`).set({
            name: name,
            avatar: "https://ui-avatars.com/api/?name="+name+"&background=random",
            lastMsg: "Connected to Neural Link."
        });
    }

    // Initial Load
    loadChats();

</script>
</body>
</html>
