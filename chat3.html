<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 LUPIN NEURAL LINK | Cosmic Chat</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0a0718, #010003);
            overflow: hidden;
            position: relative;
        }

        /* ANIMATED SPACE BACKGROUND */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .comet {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, cyan, #b026ff);
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 12px cyan;
            animation: fly 12s linear infinite;
            pointer-events: none;
        }
        @keyframes fly {
            0% { transform: translateX(-10vw) translateY(20vh) rotate(0deg); opacity: 0;}
            10% { opacity: 1;}
            90% { opacity: 1;}
            100% { transform: translateX(120vw) translateY(-20vh) rotate(15deg); opacity: 0;}
        }

        /* MAIN APP - GLASS + NEON */
        .app-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            backdrop-filter: blur(2px);
        }

        /* SIDEBAR (CHATS LIST) */
        .sidebar {
            width: 320px;
            background: rgba(8, 5, 20, 0.65);
            backdrop-filter: blur(14px);
            border-right: 1px solid rgba(0, 229, 255, 0.3);
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 25px rgba(0,0,0,0.5);
        }
        .user-header {
            padding: 20px 16px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(176, 38, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00e5ff;
            box-shadow: 0 0 8px #b026ff;
            background: #1e1a2f;
        }
        .user-info {
            flex: 1;
        }
        .username {
            font-weight: bold;
            color: #f0f0ff;
            text-shadow: 0 0 3px cyan;
        }
        .online-dot {
            width: 12px;
            height: 12px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            box-shadow: 0 0 5px #2ecc71;
        }
        .status-text {
            font-size: 12px;
            color: #b0b3d0;
        }
        .new-chat-btn {
            background: linear-gradient(45deg, #00e5ff, #b026ff);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            background: rgba(20, 15, 45, 0.6);
            margin: 8px 0;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .chat-item.active {
            background: rgba(0, 229, 255, 0.2);
            border-left: 4px solid cyan;
            box-shadow: 0 0 10px rgba(0,229,255,0.4);
        }
        .chat-name {
            font-weight: bold;
            color: #e0e0ff;
        }
        .unread-badge {
            background: #b026ff;
            border-radius: 40px;
            padding: 2px 8px;
            font-size: 11px;
            color: white;
        }

        /* MAIN CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 3, 15, 0.5);
            backdrop-filter: blur(4px);
        }
        .chat-header {
            padding: 16px 24px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid #00e5ff55;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .call-buttons button {
            background: #1a142f;
            border: none;
            color: cyan;
            margin: 0 6px;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 0 4px cyan;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            background-size: 280px;
        }
        .message {
            max-width: 70%;
            margin-bottom: 12px;
            clear: both;
        }
        .message.own {
            float: right;
        }
        .message.other {
            float: left;
        }
        .bubble {
            background: rgba(20, 18, 48, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 22px;
            padding: 10px 16px;
            color: #f0f0ff;
            border: 1px solid #00e5ff66;
            word-wrap: break-word;
        }
        .own .bubble {
            background: linear-gradient(135deg, #00e5ff30, #b026ff30);
            border: 1px solid #b026ff;
        }
        .msg-meta {
            font-size: 10px;
            color: #a0a0dd;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }
        .status-icon {
            font-size: 11px;
        }
        .media-preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            cursor: pointer;
        }
        .input-area {
            padding: 16px;
            background: rgba(0,0,0,0.6);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        #messageInput {
            flex: 1;
            background: #1f1b38;
            border: 1px solid #b026ff;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: cyan;
            transition: 0.1s;
        }
        /* status modal etc */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: #12101f;
            border-radius: 32px;
            padding: 20px;
            width: 340px;
            border: 2px solid cyan;
        }
        .group-input {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            background: #2a2545;
            color: white;
            border-radius: 20px;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        button {
            background: #b026ff;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        video {
            width: 100%;
            max-height: 240px;
            background: black;
            border-radius: 20px;
        }
        .call-modal {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 300px;
            background: #0a0722;
            border-radius: 24px;
            padding: 12px;
            z-index: 999;
            border: 2px solid cyan;
        }
        @media (max-width: 700px) {
            .sidebar { width: 260px; }
        }
    </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="app-container" id="appRoot"></div>

<script>
    // ---------- FIREBASE INIT (EXACT CONFIG) ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBZB8z8rSFohwnVx8M4wBHr4O51BFbFw9g",
        authDomain: "lupin-neural-link.firebaseapp.com",
        databaseURL: "https://lupin-neural-link-default-rtdb.firebaseio.com",
        projectId: "lupin-neural-link",
        storageBucket: "lupin-neural-link.appspot.com",
        messagingSenderId: "511177248524",
        appId: "1:511177248524:web:b02b141e3259e8790d0329",
        measurementId: "G-S920ZSN573"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    // ----- USER SYSTEM -----
    let currentUser = localStorage.getItem("systemUser");
    if (!currentUser) {
        currentUser = "user" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("systemUser", currentUser);
    }
    let profilePicUrl = "";
    let currentChatId = null;
    let unreadMap = new Map(); // chatId -> count
    let peerConnection = null;
    let localStream = null;
    let remoteVideoActive = false;
    let callActive = false;
    let currentCallChatId = null;

    // Helper: update online status
    function setOnlineStatus(isOnline) {
        if (currentUser) {
            db.ref(`users/${currentUser}`).update({ online: isOnline, lastSeen: Date.now() });
            if (isOnline) {
                db.ref(`users/${currentUser}/online`).onDisconnect().set(false);
            }
        }
    }
    setOnlineStatus(true);
    window.addEventListener("beforeunload", () => setOnlineStatus(false));

    // profile pic upload
    async function uploadProfilePic(file) {
        if (!file) return;
        const ref = storage.ref(`users/${currentUser}/profilePic`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        profilePicUrl = url;
        await db.ref(`users/${currentUser}`).update({ profilePic: url });
        document.getElementById("profileAvatar")?.setAttribute("src", url);
    }

    // starfield generator
    function generateStars() {
        const container = document.getElementById("starsContainer");
        for (let i = 0; i < 180; i++) {
            const star = document.createElement("div");
            star.classList.add("star");
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.width = Math.random() * 3 + 1 + "px";
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 5 + "s";
            container.appendChild(star);
        }
        for (let i = 0; i < 6; i++) {
            const comet = document.createElement("div");
            comet.classList.add("comet");
            comet.style.top = Math.random() * 80 + "%";
            comet.style.left = "-10%";
            comet.style.animationDuration = 8 + Math.random() * 12 + "s";
            comet.style.animationDelay = Math.random() * 15 + "s";
            container.appendChild(comet);
        }
    }
    generateStars();

    // ---------- RENDER SIDEBAR (chats + groups) ----------
    async function loadChatsList() {
        const userId = currentUser;
        const userChatsRef = db.ref(`chats`);
        userChatsRef.on('value', async (snapshot) => {
            const chatsData = snapshot.val() || {};
            const chatArray = [];
            for (let chatId in chatsData) {
                // each chat contains metadata (name, type, members)
                const meta = chatsData[chatId]?.meta || { name: chatId.slice(0,8), type: "private" };
                let unreadCount = unreadMap.get(chatId) || 0;
                chatArray.push({ id: chatId, name: meta.name || chatId, type: meta.type, unread: unreadCount });
            }
            renderSidebar(chatArray);
        });
    }
    function renderSidebar(chats) {
        const sidebarDiv = document.querySelector('.sidebar');
        if(!sidebarDiv) return;
        const listDiv = sidebarDiv.querySelector('.chats-list');
        if(!listDiv) return;
        listDiv.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
            item.innerHTML = `
                <div><span class="chat-name">${escapeHtml(chat.name)}</span> ${chat.type === 'group' ? '👥' : '💬'}</div>
                ${chat.unread > 0 ? `<span class="unread-badge">${chat.unread}</span>` : ''}
            `;
            item.onclick = () => openChat(chat.id);
            listDiv.appendChild(item);
        });
    }

    function openChat(chatId) {
        if(currentChatId === chatId) return;
        currentChatId = chatId;
        unreadMap.set(chatId, 0);
        loadMessages(chatId);
        loadChatsList();
        document.querySelector('.chat-header-name').innerText = chatId.substring(0, 16);
    }

    // MESSAGING REAL-TIME
    function loadMessages(chatId) {
        const msgContainer = document.getElementById("messagesContainer");
        if(!msgContainer) return;
        const msgRef = db.ref(`chats/${chatId}/messages`);
        msgRef.off(); // remove old
        msgRef.on('child_added', (snap) => {
            const msg = snap.val();
            if(msg) displayMessage(msg, chatId, snap.key);
            // mark delivered if not own and status delivered -> update read later
            if(msg.sender !== currentUser && msg.status !== 'read') {
                msgRef.child(snap.key).update({ status: 'delivered' });
            }
            // update unread if chat open? else unread counter already increased
            if(currentChatId !== chatId && msg.sender !== currentUser) {
                let prev = unreadMap.get(chatId) || 0;
                unreadMap.set(chatId, prev+1);
                loadChatsList();
            }
        });
        msgRef.on('child_changed', (snap) => {
            const updated = snap.val();
            document.querySelectorAll(`.message[data-id="${snap.key}"]`).forEach(el => {
                const statusSpan = el.querySelector('.status-icon');
                if(statusSpan) statusSpan.innerText = updated.status === 'read' ? '✓✓ read' : (updated.status === 'delivered' ? '✓✓' : '✓');
            });
        });
    }

    function displayMessage(msg, chatId, msgId) {
        const container = document.getElementById("messagesContainer");
        if(!container) return;
        const isOwn = msg.sender === currentUser;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.setAttribute('data-id', msgId);
        let mediaHtml = '';
        if(msg.image) mediaHtml = `<img src="${msg.image}" class="media-preview" onclick="window.open('${msg.image}')" />`;
        if(msg.video) mediaHtml = `<video src="${msg.video}" controls class="media-preview"></video>`;
        if(msg.audio) mediaHtml = `<audio controls src="${msg.audio}" style="max-width:180px"></audio>`;
        div.innerHTML = `
            <div class="bubble">
                ${msg.text ? `<div>${escapeHtml(msg.text)}</div>` : ''}
                ${mediaHtml}
                <div class="msg-meta">
                    <span>${new Date(msg.timestamp).toLocaleTimeString()}</span>
                    <span class="status-icon">${isOwn ? (msg.status === 'read' ? '✓✓ read' : (msg.status === 'delivered' ? '✓✓' : '✓')) : ''}</span>
                </div>
            </div>
        `;
        container.appendChild(div);
        if(!isOwn && currentChatId === chatId) {
            db.ref(`chats/${chatId}/messages/${msgId}`).update({ status: 'read' });
        }
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage(text, file=null, type='text') {
        if(!currentChatId) return alert("Select a chat first");
        const newMsgRef = db.ref(`chats/${currentChatId}/messages`).push();
        let payload = { sender: currentUser, timestamp: Date.now(), status: 'sent', text: text || '' };
        if(file && type==='image') {
            const storageRef = storage.ref(`chats/${currentChatId}/media/${Date.now()}_img`);
            storageRef.put(file).then(async (snap) => {
                const url = await snap.ref.getDownloadURL();
                newMsgRef.update({ image: url, text: text || '', sender: currentUser, timestamp: Date.now(), status: 'sent' });
            });
            return;
        } else if(file && type==='audio') {
            const storageRef = storage.ref(`chats/${currentChatId}/audio/${Date.now()}_voice`);
            storageRef.put(file).then(async (snap) => {
                const url = await snap.ref.getDownloadURL();
                newMsgRef.update({ audio: url, text: text || '🎤 Voice note', sender: currentUser, timestamp: Date.now(), status: 'sent' });
            });
            return;
        } else if(file && type==='video') {
            const storageRef = storage.ref(`chats/${currentChatId}/video/${Date.now()}_vid`);
            storageRef.put(file).then(async (snap) => {
                const url = await snap.ref.getDownloadURL();
                newMsgRef.update({ video: url, text: text || '📹 Video', sender: currentUser, timestamp: Date.now(), status: 'sent' });
            });
            return;
        }
        newMsgRef.set(payload);
    }

    // edit/delete
    function editLastMessage(newText) { /* simplified: find last own message and update */
        if(!currentChatId) return;
        const msgRef = db.ref(`chats/${currentChatId}/messages`).orderByChild('sender').equalTo(currentUser).limitToLast(1);
        msgRef.once('child_added', (snap) => {
            snap.ref.update({ text: newText });
        });
    }
    function deleteMessage(msgId) {
        if(!currentChatId) return;
        db.ref(`chats/${currentChatId}/messages/${msgId}`).remove();
    }

    // ------ GROUPS & INVITE ------
    function createGroup(groupName, membersStr) {
        const chatId = "group_" + Date.now();
        const members = membersStr.split(',').map(m=>m.trim());
        members.push(currentUser);
        db.ref(`chats/${chatId}/meta`).set({ name: groupName, type: 'group', members: members });
        openChat(chatId);
    }
    function generateInviteLink() {
        if(currentChatId) prompt("Invite link (copy ID):", currentChatId);
    }

    // ----- STATUS (WhatsApp style) - Auto delete after 5h -----
    async function uploadStatus(file, isVideo=false) {
        const statusId = Date.now();
        const storageRef = storage.ref(`status/${currentUser}/${statusId}`);
        await storageRef.put(file);
        const url = await storageRef.getDownloadURL();
        await db.ref(`status/${currentUser}/${statusId}`).set({ url, timestamp: Date.now(), views: {}, likes: 0, type: isVideo ? 'video':'image' });
        setTimeout(() => {
            db.ref(`status/${currentUser}/${statusId}`).remove();
            storage.ref(`status/${currentUser}/${statusId}`).delete().catch(e=>console.log);
        }, 5*3600*1000);
    }
    function showStatusModal() { alert("Upload status: use file input in UI (media picker)"); }

    // ----- WEBRTC CALLS (Firebase signaling)-----
    async function startCall(chatId, isVideoCall) {
        if(!chatId) return alert("Open a chat first");
        currentCallChatId = chatId;
        const callId = `call_${chatId}`;
        const servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        peerConnection = new RTCPeerConnection(servers);
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideoCall });
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        if(isVideoCall) {
            const videoElement = document.createElement('video');
            videoElement.autoplay = true;
            videoElement.srcObject = localStream;
            document.body.appendChild(videoElement);
        }
        peerConnection.onicecandidate = event => {
            if(event.candidate) {
                db.ref(`calls/${callId}/candidate`).push(event.candidate);
            }
        };
        peerConnection.ontrack = event => {
            const remoteVideo = document.createElement('video');
            remoteVideo.autoplay = true;
            remoteVideo.srcObject = event.streams[0];
            document.body.appendChild(remoteVideo);
        };
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        db.ref(`calls/${callId}/offer`).set({ sdp: offer.sdp, type: offer.type, sender: currentUser });
        db.ref(`calls/${callId}/answer`).on('value', async (snap) => {
            const ans = snap.val();
            if(ans && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(ans));
            }
        });
    }
    async function answerCall(chatId) { /* similar */ }
    
    // UI RENDERING ENTIRE APP
    function renderFullUI() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
            <div class="sidebar">
                <div class="user-header">
                    <img id="profileAvatar" class="avatar" src="https://via.placeholder.com/48?text=👤" />
                    <div class="user-info">
                        <div class="username">${currentUser} <span class="online-dot"></span></div>
                        <div class="status-text">Galactic online</div>
                    </div>
                    <button class="new-chat-btn" id="newGroupBtn">+ Group</button>
                </div>
                <div class="chats-list" id="chatsList"></div>
                <div style="padding:12px; display:flex; gap:8px;">
                    <button id="uploadStatusBtn" style="background:#12101f">✨ Status</button>
                    <input type="file" id="profilePicInput" style="display:none" accept="image/*"/>
                    <button id="changePicBtn">🖼️ Avatar</button>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <span class="chat-header-name" style="color:cyan">✨ Select Chat ✨</span>
                    <div class="call-buttons">
                        <button id="voiceCallBtn">🎙️ Voice</button>
                        <button id="videoCallBtn">📹 Video</button>
                        <button id="inviteBtn">🔗 Invite</button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Message..."/>
                    <input type="file" id="mediaUpload" style="display:none" accept="image/*,video/*,audio/*"/>
                    <button class="icon-btn" id="attachBtn">📎</button>
                    <button class="icon-btn" id="voiceNoteBtn">🎤</button>
                    <button id="sendBtn" style="background:cyan; color:black;">🚀 Send</button>
                </div>
            </div>
        `;
        document.getElementById("profileAvatar").src = profilePicUrl || "https://via.placeholder.com/48?text=👤";
        document.getElementById("newGroupBtn").onclick = () => {
            const name = prompt("Group name");
            const members = prompt("Members (comma user IDs)");
            if(name) createGroup(name, members);
        };
        document.getElementById("voiceCallBtn").onclick = () => startCall(currentChatId, false);
        document.getElementById("videoCallBtn").onclick = () => startCall(currentChatId, true);
        document.getElementById("inviteBtn").onclick = () => generateInviteLink();
        document.getElementById("sendBtn").onclick = () => {
            const inp = document.getElementById("messageInput");
            if(inp.value.trim()) sendMessage(inp.value.trim());
            inp.value = '';
        };
        document.getElementById("attachBtn").onclick = () => {
            const fileInput = document.getElementById("mediaUpload");
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    if(file.type.startsWith('image/')) sendMessage('📸 Image', file, 'image');
                    else if(file.type.startsWith('video/')) sendMessage('📹 Video', file, 'video');
                    else alert("Unsupported for now");
                }
            };
            fileInput.click();
        };
        document.getElementById("voiceNoteBtn").onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                sendMessage('🎤 Voice note', blob, 'audio');
                stream.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
            alert("Recording 5s voice note...");
        };
        document.getElementById("changePicBtn").onclick = () => {
            const picker = document.getElementById("profilePicInput");
            picker.onchange = (e) => uploadProfilePic(e.target.files[0]);
            picker.click();
        };
        document.getElementById("uploadStatusBtn").onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = "image/*,video/*";
            input.onchange = async (ev) => {
                const file = ev.target.files[0];
                if(file) await uploadStatus(file, file.type.startsWith('video/'));
                alert("Status uploaded (auto-delete 5h)");
            };
            input.click();
        };
        loadChatsList();
        const msgCont = document.getElementById("messagesContainer");
        if(msgCont) msgCont.innerHTML = '';
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    renderFullUI();
</script>
</body>
</html>
