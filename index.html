<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPINHACK | THE ARCHITECT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.8);
            --hacker-green: #00ff41;
        }

        * { box-sizing: border-box; text-transform: uppercase; margin: 0; padding: 0; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark); color: white; overflow-x: hidden;
        }

        /* 🌌 Space Background */
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: move linear infinite; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* HEADER */
        header {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.95); border-bottom: 3px solid var(--accent);
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        
        .agent-btn {
            background: var(--accent); color: black; padding: 10px 20px;
            font-weight: 900; border: none; box-shadow: 0 0 15px var(--accent-glow);
            display: flex; align-items: center; gap: 10px;
        }

        .main-container { max-width: 900px; margin: 50px auto; padding: 20px; }

        /* 🔍 LUPER SEARCH CORE - INTERNAL SYSTEM */
        .search-section {
            background: rgba(0,0,0,0.8); border: 2px solid var(--accent);
            padding: 30px; margin-bottom: 40px; box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-group { display: flex; gap: 0; margin-bottom: 20px; }
        .search-group input {
            flex: 1; padding: 15px; background: #000; border: 1px solid var(--accent);
            color: var(--accent); font-family: 'Orbitron'; outline: none;
        }
        .search-group button {
            background: var(--accent); color: black; border: none; padding: 0 25px;
            font-weight: 900; cursor: pointer; font-family: 'Orbitron';
        }

        #luperResults {
            text-align: left; max-height: 500px; overflow-y: auto; padding-right: 10px;
        }
        .result-card {
            background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--accent);
            padding: 15px; margin-bottom: 15px; transition: 0.3s;
        }
        .result-card:hover { background: rgba(0, 242, 255, 0.1); }
        .result-card a { 
            color: var(--accent); text-decoration: none; font-weight: bold; 
            font-size: 15px; text-transform: none; 
        }
        .result-card p { 
            color: #ccc; font-size: 12px; text-transform: none; 
            margin-top: 5px; line-height: 1.4; font-family: 'JetBrains Mono';
        }

        /* 🤖 AI CHAT BOX */
        .ai-box {
            background: rgba(0,255,65,0.05); border: 1px solid var(--hacker-green);
            padding: 30px; margin-bottom: 40px; text-align: left;
        }
        .ai-input-group { display: flex; gap: 10px; margin-top: 15px; }
        .ai-input-group input {
            flex: 1; background: #000; border: 1px solid var(--hacker-green);
            padding: 12px; color: var(--hacker-green); font-family: 'JetBrains Mono'; outline: none;
        }
        .ai-btn {
            background: var(--hacker-green); color: black; border: none;
            padding: 0 20px; font-weight: 900; cursor: pointer;
        }

        /* 🎬 CINEMA & BIO */
        .cinema-card {
            background: rgba(255,255,255,0.03); padding: 40px;
            border: 2px solid var(--accent); margin-bottom: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: 0.3s; cursor: pointer;
        }
        .cinema-card:hover { box-shadow: 0 0 30px var(--accent); background: rgba(0,242,255,0.05); }

        .bio-box {
            background: rgba(0,0,0,0.8); border: 1px solid var(--hacker-green);
            padding: 40px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .bio-text { font-family: 'JetBrains Mono', monospace; color: var(--hacker-green); line-height: 1.6; }

        /* FOOTER FIXED COLORS */
        footer { text-align: center; padding: 60px; border-top: 1px solid rgba(0, 242, 255, 0.2); }
        .blue-year { color: var(--accent); font-family: 'Orbitron', sans-serif; font-weight: 900; }
        .special-sig { font-family: 'Dancing Script', cursive; font-size: 35px; color: var(--accent); text-transform: none; text-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>
    <div id="space-bg"></div>

    <header>
        <div class="logo">LUPINHACK⚡</div>
        <div class="agent-btn">
            <i class="fas fa-user-shield"></i> <span id="displayAgent">AGENT</span>
        </div>
    </header>

    <div class="main-container">
        
        <div class="search-section">
            <h3 style="color: var(--accent); margin-bottom: 15px;">LUPIN SEARCH CORE</h3>
            <div class="search-group">
                <input type="text" id="luperSearchInput" placeholder="ENTER SEARCH COMMAND...">
                <button onclick="executeLuperSearch()">SEARCH</button>
            </div>
            <div id="luperResults">
                <p style="color: #444; font-size: 11px;">SYSTEM READY FOR QUERY...</p>
            </div>
        </div>

        <div class="ai-box">
            <h3 style="color: var(--hacker-green);">LUPIN AI ASSISTANT</h3>
            <div id="ai-response" style="font-size: 13px; color: #aaa; margin-top: 10px; min-height: 40px; font-family: 'JetBrains Mono';">READY FOR COMMANDS...</div>
            <div class="ai-input-group">
                <input type="text" id="ai-query" placeholder="ASK ANYTHING ABOUT IT...">
                <button onclick="askLupinAI()" class="ai-btn">SEND</button>
            </div>
        </div>

        <div class="cinema-card" onclick="window.location.href='movies.html'">
            <h2 style="color: var(--accent); letter-spacing: 5px;">ENTER CINEMA ENGINE</h2>
            <button style="background: var(--hacker-green); color:black; padding: 10px 30px; border:none; font-weight:900;">OPEN DATABASE</button>
        </div>

        <div class="bio-box">
            <h2 style="color: var(--hacker-green); margin-bottom: 20px;">DEVELOPER INTEL</h2>
            <div id="typewriter" class="bio-text"></div>
        </div>
    </div>

    <footer>
        <p>MADE WITH <span style="color: var(--hacker-green);">💚</span> IN TANZANIA</p>
        <p style="margin-top: 20px;">© <span class="blue-year">2026</span> <span class="special-sig">Lupin Starnley Jimmoh</span></p>
    </footer>

    <script>
        // Agent Identity
        const agent = localStorage.getItem('agentName') || "SHADOW";
        document.getElementById('displayAgent').innerText = agent;

        // 🔍 NEW INTERNAL SEARCH ENGINE
        async function executeLuperSearch() {
            const query = document.getElementById('luperSearchInput').value;
            const resArea = document.getElementById('luperResults');
            if(!query) return;

            resArea.innerHTML = "<p style='color: var(--accent);'>[SYSTEM] FETCHING INTEL FROM GLOBAL SERVERS...</p>";

            const API_KEY = "AIzaSyDl2jrRffbN4qyY81iCNDD1zETMqn8hoFA"; 
            const CX_ID = "a7ba9c991ec004481"; 

            try {
                const r = await fetch(`https://www.googleapis.com/customsearch/v1?key=${API_KEY}&cx=${CX_ID}&q=${query}`);
                const d = await r.json();

                if(d.items) {
                    let html = "";
                    d.items.forEach(item => {
                        html += `
                        <div class="result-card">
                            <a href="${item.link}" target="_self">${item.title}</a>
                            <p>${item.snippet}</p>
                        </div>`;
                    });
                    resArea.innerHTML = html;
                } else {
                    resArea.innerHTML = "<p style='color: red;'>NO RESULTS FOUND IN THIS SECTOR.</p>";
                }
            } catch(e) {
                resArea.innerHTML = "<p style='color: red;'>CRITICAL ERROR: CONNECTION LOST.</p>";
            }
        }

        // AI Functionality
        async function askLupinAI() {
            const query = document.getElementById('ai-query').value;
            const responseArea = document.getElementById('ai-response');
            if(!query) return;
            
            responseArea.innerText = "THINKING...";
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    headers: { Authorization: "Bearer hf_ZJjRzYdAbKjQxVbLnPm" },
                    method: "POST",
                    body: JSON.stringify({ inputs: query }),
                });
                const data = await response.json();
                responseArea.innerText = data[0].generated_text.slice(0, 300) + "...";
            } catch (e) {
                responseArea.innerText = "CONNECTION ERROR. CHECK TOKEN.";
            }
        }

        // Typewriter Effect
        const bioText = "INITIALIZING DEVELOPER PROFILE... NAME: LUPIN. ORIGIN: KIBAHA, TANZANIA. OCCUPATION: IT MASTERMIND. LUPINHACK IS THE CORE HUB FOR DIGITAL EXPLORATION. ENJOY THE SUITE.";
        let i = 0;
        function typeWriter() {
            if (i < bioText.length) {
                document.getElementById("typewriter").innerHTML += bioText.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        window.onload = () => {
            typeWriter();
            const space = document.getElementById('space-bg');
            for (let s = 0; s < 100; s++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = '2px'; star.style.height = '2px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 50 + 20) + 's';
                space.appendChild(star);
            }
        };
    </script>
</body>
</html>
