<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPINHACK | MOVIE ENGINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.8);
            --card-bg: rgba(17, 21, 28, 0.9);
            --hacker-green: #00ff41;
        }

        * { box-sizing: border-box; text-transform: uppercase; }

        body {
            margin: 0; font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark); color: white; overflow-x: hidden;
        }

        /* 🌌 Space Background */
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: move linear infinite; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* Header Fix */
        header {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.95); border-bottom: 3px solid var(--accent);
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        
        /* Agent Button (Sharp Edges) */
        .agent-display {
            background: var(--accent); color: black; padding: 8px 15px;
            font-weight: 900; border: none; box-shadow: 0 0 10px var(--accent-glow);
            display: flex; align-items: center; gap: 8px; font-size: 12px;
        }

        .movie-container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }

        /* Search Section */
        .search-box {
            display: flex; gap: 10px; max-width: 800px; margin: 0 auto 50px auto;
        }
        .search-box input {
            flex: 1; padding: 15px; border: 2px solid var(--accent);
            background: rgba(0,0,0,0.5); color: white; outline: none;
            box-shadow: 0 0 10px var(--accent-glow); font-family: 'Orbitron', sans-serif;
        }
        .btn-search {
            background: var(--accent); color: black; border: none; padding: 0 30px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-search:hover { box-shadow: 0 0 20px var(--accent); }

        /* Video Grid */
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .video-card {
            background: var(--card-bg); border: 1px solid var(--accent);
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .video-card:hover { transform: translateY(-10px); box-shadow: 0 0 20px var(--accent-glow); }
        .video-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid var(--accent); }
        
        .video-details { padding: 15px; }
        .video-title { 
            font-size: 13px; font-weight: bold; height: 40px; 
            overflow: hidden; color: var(--accent); line-height: 1.4;
        }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-act {
            flex: 1; padding: 10px; text-align: center; font-weight: 900;
            text-decoration: none; font-size: 11px; border: 1px solid transparent;
        }
        .btn-watch { background: var(--accent); color: black; }
        .btn-download { background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b; }
        .btn-download:hover { background: #ff4b2b; color: white; }

        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 12px; font-weight: 900; }
    </style>
</head>
<body>
    <div id="space-bg"></div>

    <header>
        <div class="logo">LUPINHACK⚡</div>
        <nav style="display: flex; align-items: center;">
            <a href="index.html">HOME</a>
            <div class="agent-display" style="margin-left: 20px;">
                <i class="fas fa-user-shield"></i> <span id="displayAgent">AGENT</span>
            </div>
            <a href="#" onclick="logout()" style="color: #ff4b2b;">EXIT</a>
        </nav>
    </header>

    <div class="movie-container">
        <div class="search-box">
            <input type="text" id="query" placeholder="ENTER MOVIE NAME OR KEYWORD...">
            <button onclick="searchYouTube()" class="btn-search">SEARCH</button>
        </div>

        <div id="results" class="results-grid">
            </div>
    </div>

    <script>
        // 🔒 Security: Lazima awe na Agent Name
        const agent = localStorage.getItem('agentName') || "GUEST";
        document.getElementById('displayAgent').innerText = agent;

        // API KEY YAKO YA USHINDI
        const API_KEY = 'AIzaSyDl2jrRffbN4qyY81iCNDD1zETMqn8hoFA';

        async function searchYouTube() {
            const query = document.getElementById('query').value;
            if(!query) return;

            // Loading state
            document.getElementById('results').innerHTML = '<p style="text-align: center; width: 100%;">ACCESSING SATELLITE... PLEASE WAIT.</p>';

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${query}&type=video&key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.items) {
                    renderVideos(data.items);
                } else {
                    alert("Quota Exceeded or API Error. Try again later.");
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed!");
            }
        }

        function renderVideos(videos) {
            const results = document.getElementById('results');
            results.innerHTML = '';
            videos.forEach(v => {
                const id = v.id.videoId;
                const title = v.snippet.title;
                const thumb = v.snippet.thumbnails.high.url;

                results.innerHTML += `
                    <div class="video-card">
                        <img src="${thumb}">
                        <div class="video-details">
                            <div class="video-title">${title}</div>
                            <div class="action-btns">
                                <a href="https://www.youtube.com/watch?v=${id}" target="_blank" class="btn-act btn-watch">WATCH</a>
                                <a href="https://www.ssyoutube.com/watch?v=${id}" target="_blank" class="btn-act btn-download">DOWNLOAD</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Space Background Animation
        const space = document.getElementById('space-bg');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 50 + 20) + 's';
            space.appendChild(star);
        }

        // Auto-load trending movies on startup
        window.onload = () => {
            document.getElementById('query').value = "TRENDING MOVIES 2026";
            searchYouTube();
        };
    </script>
</body>
</html>
